# Gemini 3.1 Pro analyst arm — second non-Anthropic arm under v2 methodology.
#
# Tests whether the drift profile observed for Anthropic + OpenAI arms
# reproduces in Google's top-tier reasoning model at vendor-max thinking.
# All other variables (extractor, judge, prompts, materials, design grid,
# noise pool, seeds) held identical via base.yaml.
#
# v2 methodology — see MULTI_VENDOR_ADDENDUM.md.
#
# UNVERIFIED at lock authoring time (will validate during smoke test):
#   - thinking_level=HIGH accepted by gemini-3-pro-preview (alias may
#     redirect to current 3.1 Pro per Google docs).
#   - max_output_tokens=64000 accommodates HIGH thinking + 8-answer JSON.
#     Gemini 3 docs say "up to 65,536"; using 64K headroom-safe.
#   - 1M context window (1,048,576) — confirmed at Vertex AI docs.
#   - Tiered pricing: ≤200K $2/$12 vs >200K $4/$18. Base.yaml lists the
#     high tier since 12/13 cells exceed 200K.
#   - Snapshot string is mutable (alias). model_version returned per call
#     is logged into raw records as the build-identifier audit trail.

experiment:
  # Override base.yaml v1 hash with v2 hash (DESIGN + PROMPTS + RUBRIC + MULTI_VENDOR_ADDENDUM).
  # Locked 2026-04-25T23:35:00Z per pre_registration.v2.lock methodology_hash.
  pre_registration_hash: "3433f4a67cde4b24b92a1b41a78271aa5dbb4572beb2ee23e1d8c2c31d189e8e"

arm:
  name: gemini-3-1-pro
  description: "Google Gemini 3.1 Pro Preview with thinking_level=HIGH (vendor max). v2 multi-vendor arm."

models:
  analyst:
    vendor: google
    snapshot: "gemini-3-pro-preview"
    snapshot_note: |
      Google Gemini 3.x Pro Preview. Snapshot string is a mutable alias —
      gemini-3-pro-preview redirects to current 3.1 Pro on the Gemini API
      (Vertex AI exposes versioned aliases separately). The harness logs
      model_version returned per call into raw records as the per-call
      build identifier; arm.lock.json records both the requested string
      and observed model_versions.
      thinking_level=HIGH is the vendor max — top of {MINIMAL, LOW,
      MEDIUM, HIGH}. The legacy thinking_budget integer was deprecated
      in Gemini 3. Encrypted thought signatures are exposed per part
      when include_thoughts=true; raw chain-of-thought is not exposed
      (analogous to Anthropic Opus redaction).
    context_window: 1048576
    # MUST be null for non-Anthropic vendors (config validator enforces).
    thinking_effort: null
    thinking_config:
      thinking_level: HIGH
    # 64K — Gemini 3 max_output_tokens documented up to 65,536. Headroom
    # to fit thinking output + 8-answer JSON body. Smoke test verifies.
    max_output_tokens: 64000
    temperature: 1.0
