# Haiku 4.5 analyst arm — comparison arm.
#
# Tests the drift profile of the smallest current Claude model. Two open
# methodology questions must be resolved before this arm produces comparable
# data:
#
#   (1) Adaptive thinking support. If Haiku 4.5 does NOT accept
#       `thinking.type.adaptive` with effort=max, this arm is not directly
#       comparable to Opus/Sonnet at max effort. Options:
#         a) Run at the highest effort Haiku does support (likely "high").
#         b) Run without extended thinking, document as a separate condition.
#       Verify with scripts/probe_effort.py against the Haiku snapshot before
#       running. If "max" is rejected, the arm.lock.json analyst section will
#       capture the actual effort used — interpretation must adjust.
#
#   (2) Context window. Haiku 4.5 is typically 200K, not 1M. The fill grid
#       (5 levels × 3 positions) is preserved; we just rescale the absolute
#       token target. fill=0.95 means "95% of available context" regardless
#       of arm — drift is measured RELATIVE to model capacity, not in
#       absolute tokens. See ARMS.md for the within-vs-across-arm analysis
#       implications of this design choice.

arm:
  name: haiku-4-5
  description: "Haiku 4.5 at max-supported effort (requires verification of effort=max acceptance)."

models:
  analyst:
    snapshot: "claude-haiku-4-5-20251001"
    context_window: 200000     # VERIFY: confirm Haiku 4.5 context window
    thinking_effort: "max"     # VERIFY: probe_effort.py — drop to "high" or null if rejected
    max_output_tokens: 16384   # smaller — full 8-answer JSON fits in <8K, leaves thinking headroom
    temperature: 1.0

# Override total_context_target to match Haiku's smaller window.
# fill_levels (0.00, 0.25, 0.50, 0.75, 0.95) still apply but in absolute terms
# this means {0, 50K, 100K, 150K, 190K} instead of {0, 250K, 500K, 750K, 950K}.
tokens:
  total_context_target: 200000
  report_token_cap: 26000      # ~13% of total, matches Opus's 130K/1M ratio
