# Sonnet 4.6 — temporal-noise variant (v3 methodology).
#
# Same analyst snapshot, thinking config, temperature, and max_output_tokens
# as sonnet-4-6.yaml; only the noise type changes. v3 third-priority arm
# (per anticipated_follow_on in pre_registration.v3.lock).
#
# Why we bother with sonnet-temporal: gpt-5-5-temporal and opus-4-7-temporal
# pilots both showed H6 null (0/168 distractor hits). Sonnet at thinking
# effort=max is the only remaining Anthropic arm and provides within-vendor
# cross-model evidence: if both Opus AND Sonnet show H6 null while gpt-5.5
# does, that's a model-class invariant; if Sonnet diverges, the v3 effect
# is sensitive to model size or thinking-token allocation (Sonnet uses ~17K
# thinking tokens at max effort vs Opus's ~1-3K).
#
# CARRIED OVER from sonnet-4-6.yaml: max_output_tokens=65536 (Sonnet's
# heavier thinking allocation needs the headroom).

experiment:
  # v3 hash = sha256(DESIGN + PROMPTS + RUBRIC + MULTI_VENDOR_ADDENDUM + TEMPORAL_NOISE_ADDENDUM).
  pre_registration_hash: "10ebe9f1ea30d98fdf5453074867fee54c1e047b1463f692ac66d89a939a8043"

arm:
  name: sonnet-4-6-temporal
  description: "Anthropic Sonnet 4.6 (max thinking) under temporal_msft noise. v3 third-priority arm."

models:
  analyst:
    snapshot: "claude-sonnet-4-6"
    context_window: 1000000
    thinking_effort: "max"
    max_output_tokens: 65536
    temperature: 1.0

design:
  fill_levels: [0.00, 0.25, 0.50, 0.75, 0.95]
  positions: [start, middle, end]
  noise_types: [temporal_msft]
  reports: [MSFT]
  reps_per_cell: 7

pilot:
  cells:
    - {report: MSFT, fill: 0.00, position: null, noise: null}
    - {report: MSFT, fill: 0.50, position: middle, noise: temporal_msft}
    - {report: MSFT, fill: 0.95, position: middle, noise: temporal_msft}

# Cost-cap override (operational, not methodology-pinned).
# Sonnet's heavier thinking-token allocation (~17K vs Opus's 1-3K at max
# effort) inflates the analyst output portion. v2 sonnet-4-6 analyst spend
# was ~$217 across 91 runs; with the v3 judge stack on top (~$642), full
# grid lands near $850-900 projected. Bumping the cap to give a safety
# margin and avoid mid-grade BudgetExceeded.
cost:
  budget_usd: 850.0
  hard_stop_usd: 1050.0
