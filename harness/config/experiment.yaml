# Pre-registered experiment configuration (v0.2 simplified).
# Frozen before pilot. Hash of this file is stored in every run record.

experiment:
  name: "opus-4.7-reasoning-drift"
  version: "0.2-simplified"
  # SHA-256 of DESIGN.md + PROMPTS.md + RUBRIC.md (concatenated as raw bytes).
  # Locked 2026-04-25 after DESIGN.md §9.3 reconciliation with v0.3 PROMPTS.md
  # and v2.1 RUBRIC.md. Reproducible via:
  #   python3 -c "import hashlib; print(hashlib.sha256(b''.join(open(f, 'rb').read() for f in ['DESIGN.md','PROMPTS.md','RUBRIC.md'])).hexdigest())"
  pre_registration_hash: "61b2d30f0c741bd96f24159fedc814276df565de317f780e117a3c7e32100419"

# ------------------------------------------------------------------
# Models (snapshots locked before pilot; placeholders below).
# ------------------------------------------------------------------
models:
  analyst:
    # Opus 4.7 does NOT accept the legacy `thinking.type.enabled + budget_tokens`
    # schema. It requires `thinking.type.adaptive` plus `output_config.effort`
    # where effort ∈ {low, medium, high, xhigh, max}. "max" is the deepest
    # reasoning setting available — empirically confirmed via scripts/probe_effort.py.
    # 1M context is GA on opus-4-7; no anthropic-beta header required.
    snapshot: "claude-opus-4-7"
    context_window: 1000000
    thinking_effort: "max"
    # With thinking_effort=max, thinking tokens count toward max_output_tokens.
    # The analyst must emit 8 JSON answers (3 synthesis paragraphs); 8K was
    # truncating on Q6/Q7/Q8. 32K gives ~24K headroom for thinking plus the
    # JSON body.
    max_output_tokens: 32768
    temperature: 1.0
  extractor:
    snapshot: "claude-haiku-4-5-20251001"
    # Raised from 4096: 8 normalized records with citation+reasoning text can
    # exceed 4K, especially Q8 synthesis answers that include framework labels
    # in answer_raw. Truncation cost: silent parse failures across all reps.
    max_output_tokens: 16384
    temperature: 1.0
    thinking_effort: null               # extractor is mechanical; no thinking
  judge_primary:
    # Opus 4.7 with max effort. Same model as analyst is OK because this
    # study is a within-model contrast (fill level), not cross-model benchmark.
    # Max effort collapses per-call variance enough that single-pass replaces
    # triple-pass aggregation (see RUBRIC.md §Aggregation).
    snapshot: "claude-opus-4-7"
    # Judge output body is short (JSON object, 2-3-sentence justification), but
    # with thinking_effort=max the budget must cover thinking too.
    max_output_tokens: 16384
    temperature: 1.0
    thinking_effort: "max"
  judge_secondary:
    # Sonnet 4.6 on 20% subsample for cross-model inter-rater reliability (ICC).
    # Not a correctness check; a rubric-application consistency check. Sonnet
    # 4.6 thinking schema is assumed to match Opus 4.7's; if not, pilot first
    # judge call will surface a 400 error and we adjust.
    snapshot: "claude-sonnet-4-6"
    # Same thinking-vs-body accounting as judge_primary; raised from 2048 to
    # give thinking headroom even at "high" effort.
    max_output_tokens: 8192
    temperature: 1.0
    thinking_effort: "high"             # second-tier reliability check, not max

# ------------------------------------------------------------------
# Design grid (DESIGN.md §4).
# 3 positions × 4 fill levels = 12 noise scenarios + 1 baseline = 13 cells.
# ------------------------------------------------------------------
design:
  fill_levels: [0.00, 0.25, 0.50, 0.75, 0.95]
  positions: [start, middle, end]
  noise_types: [peer_materials]        # realistic adjacent content (peer 10-Ks)
  reports: [MSFT]                      # single target company
  reps_per_cell: 7

# Pilot (DESIGN.md §11). 3 cells × 7 reps = 21 runs, ~$50.
pilot:
  cells:
    - {report: MSFT, fill: 0.00, position: null, noise: null}
    - {report: MSFT, fill: 0.50, position: middle, noise: peer_materials}
    - {report: MSFT, fill: 0.95, position: middle, noise: peer_materials}

# ------------------------------------------------------------------
# Token budgeting (DESIGN.md §7).
# Target materials = 10-K (~100K) + earnings call (~30K) ≈ 130K tokens.
# ------------------------------------------------------------------
tokens:
  total_context_target: 1000000
  safety_margin_pct: 0.02
  fill_tolerance_tokens: 500            # runs beyond this are excluded
  report_token_cap: 130000              # cap on combined target-materials tokens
  max_budget_adjustment_iterations: 5

# ------------------------------------------------------------------
# Execution.
# ------------------------------------------------------------------
execution:
  max_concurrent_cells: 4               # cross-cell parallelism
  max_concurrent_extract: 16
  max_concurrent_judge: 16
  retry:
    max_attempts: 6
    base_delay_seconds: 30
    max_delay_seconds: 600
  cache_ttl_seconds: 280                # 5 min minus 20s safety margin
  per_run_timeout_seconds: 1800         # 30 min hard cap per analyst run

# ------------------------------------------------------------------
# Paths (all relative to harness/).
# ------------------------------------------------------------------
paths:
  materials_dir: "../materials"
  materials_lock: "../materials/materials.lock.json"
  data_dir: "./data"
  manifest_db: "./data/manifest.sqlite"
  raw_dir: "./data/raw"
  extracted_dir: "./data/extracted"
  graded_dir: "./data/graded"
  logs_dir: "./data/logs"

# ------------------------------------------------------------------
# Cost guard (DESIGN.md §13). Budget $700, hard stop $850.
# ------------------------------------------------------------------
cost:
  budget_usd: 700.0
  hard_stop_usd: 850.0
  pricing:
    # USD per million tokens — placeholders; update from live API pricing at lock time.
    opus_4_7:
      input: 15.00
      output: 75.00
      cache_read: 1.50
      cache_write: 18.75
    sonnet_4_6:
      input: 3.00
      output: 15.00
      cache_read: 0.30
      cache_write: 3.75
    haiku_4_5:
      input: 0.80
      output: 4.00
      cache_read: 0.08
      cache_write: 1.00

# ------------------------------------------------------------------
# Observability.
# ------------------------------------------------------------------
observability:
  log_level: INFO
  persist_raw_prompts: true
  persist_thinking_blocks: true
