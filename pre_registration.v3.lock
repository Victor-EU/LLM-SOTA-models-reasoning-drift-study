        "sha256": "7b1689a8408ecdc901af7ee69b223d3e69093365eb94b77ae68c235f90edbe0e",
        "rule": "Per RUBRIC.md §scope_adherence + TEMPORAL_NOISE_ADDENDUM.md §5.2: scope_adherence is capped at 3 when (cross_contamination + temporal_contamination) >= 1. Implemented in code as a safety net independent of judge compliance. For peer arms (temporal_contamination = 0), reduces to the v1/v2 rule. Bytes pinned here.",
        "judge_field_added": "AbsoluteJudgement.scope_adherence_capped (judge.py) — persisted alongside the raw judge value so the cap is auditable post hoc."
      },
      "temporal_scan": {
        "path": "harness/src/grading/temporal_scan.py",
        "sha256": "b66ea5c126a0e5ff1f3e17c3e6375e10d3de05eac253b605a6dfe477f99f7fdc",
        "rule": "Per TEMPORAL_NOISE_ADDENDUM.md §5.1: programmatic detector for temporal_contamination. Loads materials/ground_truth/MSFT_temporal_distractors.json once per grade run; per record, scans answer_normalized + answer_raw + citation for numeric matches against the q_id's distractor list with per-distractor tolerance. Count = number of distinct distractor VALUES matched (per §3.1b: as-filed + as-restated with the same value collapse to one count). Per-hit log preserves period/source/context for the §5.3 source-period diagnostic.",
        "specificity_guards": "Two pre-filters drop ambiguous numeric mentions BEFORE distractor testing: (a) _is_specific_enough — bare 1-2-digit integers without $/%/scale/decimal/comma markers cannot reach distractor magnitudes meaningful at our tolerance and are universally rejected; (b) _in_citation_context — matches preceded by structural keywords (Item|Part|Page|Note|Section|Table|Exhibit|Appendix|Schedule|Figure) within a 20-char lookback are document-structure references, never financial values. Added 2026-05-05 after v3 pilot revealed 5 false positives of the form 'Item 7' falsely matching the 6.88% YoY-growth distractor inside rel_tol. End-to-end test coverage: pilot FP texts → 0 hits; legitimate prose / JSON-answer / EPS / percent patterns → preserved hits.",
        "judge_field_overridden": "judge.py grade_q overrides AbsoluteJudgement.temporal_contamination AND AbsoluteJudgement.scope_adherence_capped (recomputed via scope_cap.apply_scope_cap with the programmatic count) for both primary (Opus) and secondary (Sonnet) judgements. Same scan result reused per record. Pairwise judge is unaffected (preference-only, no scope dimension).",
        "peer_arm_safety": "Loader is gated on cfg.design.noise_types containing 'temporal_msft'. Peer arms never load distractors → scanner is a no-op → graded output schema unchanged. v1/v2 byte-equivalence preserved end-to-end.",
        "judge_prompt_unchanged": "JUDGE_ABSOLUTE_SYSTEM_PROMPT is BYTE-IDENTICAL to v1/v2. The judge does not see temporal-distractor instructions; it cannot count temporal_contamination. The metric is purely programmatic, satisfying §11's 'judge_primary configuration held constant across all arms' invariant.",
        "sha256_history": [
          {
            "sha256": "02ad83235edeb2e626c9d497287b9709f4cf88b842f266f5a27f3c05237937df",
            "active_from": "2026-05-05 (v3 lock initial)",
            "superseded_at": "2026-05-05 (post-pilot)",
            "supersede_reason": "Pre-test scanner version. Pilot grade revealed 5 false positives (all 'Item 7' → 6.88% YoY-growth distractor within rel_tol) caused by missing specificity + citation-context guards in the regex pre-extractor. No legitimate hits were produced under this SHA. Pilot graded JSONL was programmatically rescanned with the new SHA; original graded files preserved at .v0-prescanfix-bak. Full-grid runs use the new SHA exclusively."
          }
        ]
      }
    }
  },

